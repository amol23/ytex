<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Metadata Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 md:p-8">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 mb-6 text-center">YouTube Metadata Extractor</h1>
        
        <!-- Input section -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 mb-6 flex gap-2">
            <input id="videoId" type="text" placeholder="Enter Video ID (e.g., dQw4w9WgXcQ)..." class="flex-1 p-3 border rounded-lg outline-none">
            <button onclick="fetchMetadata()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">Extract</button>
        </div>
        
        <!-- Results container -->
        <div id="result"></div>
    </div>

    <script>
        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text);
            const originalText = btn.innerText;
            btn.innerText = 'Copied!';
            setTimeout(() => btn.innerText = originalText, 2000);
        }

        async function fetchMetadata() {
            const videoId = document.getElementById('videoId').value;
            const resDiv = document.getElementById('result');
            if(!videoId) return;

            const response = await fetch(`/api/video?id=${videoId}`);
            const data = await response.json();

            if (data.items) {
                const s = data.items[0].snippet;
                const st = data.items[0].statistics;
                const tagsString = s.tags ? s.tags.join(', ') : '';
                
                resDiv.innerHTML = `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border space-y-6">
                        <div>
                            <div class="flex justify-between items-center">
                                <h2 class="text-sm font-semibold text-gray-500 uppercase">Title</h2>
                                <button onclick="copyToClipboard('${s.title.replace(/'/g, "\\'")}', this)" class="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-gray-300">Copy</button>
                            </div>
                            <p class="text-lg font-bold mt-1">${s.title}</p>
                        </div>
                        
                        <div>
                            <div class="flex justify-between items-center">
                                <h2 class="text-sm font-semibold text-gray-500 uppercase">Description</h2>
                                <button onclick="copyToClipboard(\`${s.description.replace(/`/g, '\\`')}\`, this)" class="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-gray-300">Copy</button>
                            </div>
                            <div class="p-3 bg-gray-50 rounded-lg border whitespace-pre-line text-sm mt-1">${s.description}</div>
                        </div>

                        <div>
                            <div class="flex justify-between items-center">
                                <h2 class="text-sm font-semibold text-gray-500 uppercase">Tags</h2>
                                <button onclick="copyToClipboard('${tagsString.replace(/'/g, "\\'")}', this)" class="text-xs bg-gray-200 px-2 py-1 rounded hover:bg-gray-300">Copy</button>
                            </div>
                            <p class="p-3 bg-gray-50 rounded-lg border text-sm font-mono mt-1">${tagsString || 'No tags found.'}</p>
                        </div>

                        <div class="border-t pt-4">
                            <h2 class="text-lg font-bold text-gray-900 mb-4">SEO Insights</h2>
                            <table class="w-full text-left text-sm border-collapse">
                                <tbody>
                                    <tr class="border-b"><th class="py-2 font-semibold">Views</th><td class="py-2">${parseInt(st.viewCount).toLocaleString()}</td></tr>
                                    <tr class="border-b"><th class="py-2 font-semibold">Likes</th><td class="py-2">${parseInt(st.likeCount).toLocaleString()}</td></tr>
                                    <tr class="border-b"><th class="py-2 font-semibold">Comments</th><td class="py-2">${parseInt(st.commentCount).toLocaleString()}</td></tr>
                                    <tr class="border-b"><th class="py-2 font-semibold">Channel</th><td class="py-2">${s.channelTitle}</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            } else {
                resDiv.innerHTML = `<p class="text-red-500 p-4 bg-red-50 rounded border border-red-200">${data.error.message}</p>`;
            }
        }
    </script>
</body>
</html>
